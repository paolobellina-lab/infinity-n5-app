<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity N5 - Tactical Engine v9.0</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1c1e; color: #ffffff; padding: 20px; max-width: 550px; margin: 0 auto; }
        h2 { text-align: center; color: #00ffaa; margin-bottom: 0; }
        .version { text-align: center; color: #00d2ff; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #setupScreen, #mainScreen { background-color: #25282c; padding: 25px; border-radius: 12px; border: 1px solid #3d4248; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; background-color: #121416; color: #fff; border: 1px solid #444; border-radius: 6px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-primary { background-color: #00d2ff; color: #000; }
        .btn-active { background-color: #00ffaa; color: #000; }
        .btn-reactive { background-color: #ffaa00; color: #000; }
        .btn-reset { background-color: #ff3366; color: #fff; margin-top: 20px;}
        button.recording { background-color: #ff3366 !important; color: white !important; animation: pulse 1s infinite; }
        .card { padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .active-card { background: linear-gradient(145deg, rgba(0,255,170,0.15), rgba(0,0,0,0.3)); border-left: 5px solid #00ffaa; }
        .aro-card { background: linear-gradient(145deg, rgba(255,170,0,0.15), rgba(0,0,0,0.3)); border-left: 5px solid #ffaa00; }
        .unit-name { font-size: 18px; font-weight: bold; margin: 0; display: flex; justify-content: space-between; align-items: center; }
        .stats-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 12px; color: #00ffaa; }
        .badge { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .badge-neg { color: #ff3366; border-color: #ff3366; }
        .badge-hacker { color: #bb86fc; border-color: #bb86fc; }
        .target-val { font-size: 32px; color: #fff; font-family: 'Courier New', monospace; font-weight: bold; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>TERMINAL N5</h2>
    <div class="version">v9.0 - AI Referee & Hacking Module</div>

    <div id="setupScreen">
        <div class="form-group"><label>Attaccante (G1)</label><select id="team1Select"><option>PanOceania</option><option>Nomads</option></select></div>
        <div class="form-group"><label>Difensore (G2)</label><select id="team2Select"><option>Nomads</option><option>PanOceania</option></select></div>
        <button class="btn-primary" onclick="avviaPartita()">Sincronizza Core Database 🚀</button>
    </div>

    <div id="mainScreen" style="display: none;">
        <div style="display: flex; gap: 10px;">
            <button id="btnVoice" class="btn-active">🎤 ORDINE</button>
            <button id="btnAro" class="btn-reactive">🛡️ ARO</button>
        </div>
        <div id="board" class="encounter-board" style="display: none;">
            <div id="activeActionArea"></div>
            <div id="aroListArea"></div>
            <button class="btn-reset" onclick="resetBoard()">CHIUDI SCONTRO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMpF8Le_srYjxgC7vb231Ng40iXwr256o",
            authDomain: "infinityn5-database.firebaseapp.com",
            projectId: "infinityn5-database",
            storageBucket: "infinityn5-database.firebasestorage.app",
            messagingSenderId: "506923243459",
            appId: "1:506923243459:web:4aa5e59c84c9d8156c4f76"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let fazioneAttiva, fazioneReattiva;
        window.avviaPartita = () => {
            fazioneAttiva = document.getElementById('team1Select').value;
            fazioneReattiva = document.getElementById('team2Select').value;
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = new SpeechRecognition();
        recognition.lang = 'it-IT';
        let modalita = 'active';

        document.getElementById('btnVoice').onclick = () => { modalita = 'active'; recognition.start(); };
        document.getElementById('btnAro').onclick = () => { modalita = 'reactive'; recognition.start(); };

        recognition.onresult = async (event) => {
            const testo = event.results[0][0].transcript.toLowerCase();
            await elaboraAzione(testo, modalita);
        };

        async function elaboraAzione(testo, mode) {
            const fazione = mode === 'active' ? fazioneAttiva : fazioneReattiva;
            const fazioneDoc = await getDoc(doc(db, "fazioni", fazione));
            const units = fazioneDoc.data().units;
            let unitKey = Object.keys(units).find(u => testo.includes(u));
            if (!unitKey) return;
            const unitData = units[unitKey];

            // --- LOGICA HACKING ---
            let isHacking = testo.includes("hacker") || testo.includes("hacking") || testo.includes("carbonite") || testo.includes("oblivion");
            let programName = testo.includes("carbonite") ? "CARBONITE" : (testo.includes("oblivion") ? "OBLIVION" : "HACKING");

            // --- LOGICA ARMI/EQUIP ---
            let weaponKey = unitData.weapons.find(w => testo.includes(w));
            let weaponData = weaponKey ? (await getDoc(doc(db, "armi", weaponKey))).data() : null;

            // --- MODIFICATORI ---
            let distMatch = testo.match(/(\d+)\s*(pollici|inch|distanza)/);
            let distanza = distMatch ? parseInt(distMatch[1]) : 0;
            let haCopertura = testo.includes("copertura") || testo.includes("coperto");
            let mimetismoValue = 0;
            if (testo.includes("mimetismo")) {
                let mimMatch = testo.match(/mimetismo\s*(\d+)/);
                mimetismoValue = mimMatch ? -parseInt(mimMatch[1]) : -3;
            }

            let modGittata = 0;
            if (weaponData && distanza > 0) {
                for (let range in weaponData.range) {
                    let [min, max] = range.split('-').map(Number);
                    if (distanza > min && distanza <= max) { modGittata = weaponData.range[range]; break; }
                }
            }

            const azione = {
                unita: unitKey.toUpperCase(),
                arma: isHacking ? programName : (weaponKey ? weaponKey.toUpperCase() : "FISICO"),
                statBase: isHacking ? (unitData.wip || 13) : unitData.bs,
                isHacking: isHacking,
                modG: modGittata,
                modC: haCopertura ? -3 : 0,
                modM: mimetismoValue,
                burst: isHacking ? 1 : (weaponData ? weaponData.b : 1),
                dist: distanza
            };

            if (mode === 'active') {
                window.azioneAttiva = azione;
                window.listaAro = [];
            } else {
                // SUGGERIMENTO AI: Se l'ARO ha copertura/mimetismo, applicalo all'ATTACCANTE
                if (window.azioneAttiva && !window.azioneAttiva.isHacking) {
                    window.azioneAttiva.modC = azione.modC;
                    window.azioneAttiva.modM = azione.modM;
                }
                window.listaAro = window.listaAro || [];
                window.listaAro.push(azione);
            }
            render();
        }

        function render() {
            document.getElementById('board').style.display = 'block';
            const renderCard = (a, type) => {
                let finale = a.statBase + a.modG + (type === 'active' ? (a.modC + a.modM) : 0);
                return `
                <div class="card ${type}-card">
                    <div class="unit-name">${type === 'active' ? '🟢' : '🛡️'} ${a.unita} <span class="target-val">${finale}</span></div>
                    <div class="stats-row">
                        <span class="badge ${a.isHacking ? 'badge-hacker' : ''}">${a.isHacking ? 'WIP' : 'BS'}: ${a.statBase}</span>
                        ${a.modG !== 0 ? `<span class="badge">DIST: ${a.modG > 0 ? '+' + a.modG : a.modG}</span>` : ''}
                        ${type === 'active' && a.modC !== 0 ? `<span class="badge badge-neg">TARGET COVER: -3</span>` : ''}
                        ${type === 'active' && a.modM !== 0 ? `<span class="badge badge-neg">TARGET MIMET: ${a.modM}</span>` : ''}
                    </div>
                    <div style="font-size:11px; margin-top:10px; color:#888;">AZIONE: ${a.arma} | B: ${type === 'active' ? a.burst : 1}</div>
                </div>`;
            };
            if (window.azioneAttiva) document.getElementById('activeActionArea').innerHTML = renderCard(window.azioneAttiva, 'active');
            let aroHtml = "";
            (window.listaAro || []).forEach(a => { aroHtml += renderCard(a, 'aro'); });
            document.getElementById('aroListArea').innerHTML = aroHtml;
        }

        window.resetBoard = () => { window.azioneAttiva = null; window.listaAro = []; document.getElementById('board').style.display = 'none'; };
    </script>
</body>
</html>
