<!DOCTYPE html>
<html lang="it">
<head>

    <link rel="manifest" href="manifest_hub.json">
    <link rel="icon" type="image/png" href="img/icona_hub.png">
    <link rel="apple-touch-icon" href="img/icona_hub.png">
    

    <meta charset="UTF-8">
    <title>HUB CENTRALE - REGISTA N5</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #111; color: #00ff00; font-family: 'Share Tech Mono', monospace; padding: 20px; }
        .turn-controller { text-align: center; background: #222; padding: 15px; border: 2px solid #00ff00; margin-bottom: 20px; border-radius: 10px; }
        .btn-turn { background: #00ff00; color: #000; font-family: 'Teko', sans-serif; font-size: 24px; padding: 10px 30px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; }
        .active-label { font-size: 1.5em; margin-bottom: 10px; display: block; color: #aaa; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .faction-panel { border: 1px solid #555; padding: 10px; background: #222; border-radius: 5px; }
        .log-container { background: #000; border: 1px solid #444; height: 200px; overflow-y: scroll; padding: 10px; font-size: 12px; margin-top: 20px; color: #888; }
        .state-tag { padding: 2px 5px; border-radius: 3px; font-size: 10px; margin-left: 10px; text-transform: uppercase; background: #444; color: #fff; }
    </style>
</head>
<body>
    <h1>🛰️ HUB CENTRALE - REGISTA N5</h1>

    <div class="turn-controller">
        <span class="active-label">TURNO ATTIVO ATTUALE: <b id="current-active-text" style="color:#ff0000;">NOMADS</b></span>
        <button class="btn-turn" onclick="toggleTurn()">🔄 CAMBIA TURNO ATTIVO</button>
    </div>

    <div class="status-grid">
        <div class="faction-panel">
            <h2 style="color: #ff0000;">NOMADS</h2>
            <div id="status-nomads">In attesa...</div>
        </div>
        <div class="faction-panel">
            <h2 style="color: #00ccff;">PANOCEANIA</h2>
            <div id="status-pano">In attesa...</div>
        </div>
    </div>

    <div id="battle-log" class="log-container"></div>

    <div id="step-resolution" style="display:none; padding-bottom:40px; margin-top: 20px;">
        <h1 style="text-align:center; color:#00ff00; font-family:'Teko'; font-size:52px; text-shadow:0 0 15px #00ff00; margin-bottom: 5px;">RISOLUZIONE SCONTRI</h1>
        <p style="text-align:center; color:#aaa; margin-top:0; margin-bottom:20px;">Elaborazione tiri Faccia a Faccia e Normali</p>
        
        <div id="clash-container"></div>
        
        <div style="text-align:center; margin-top:30px;">
            <button class="btn-turn" style="background:#004400; border:2px solid #00ff00; color:#fff;" onclick="window.chiudiRisoluzione()">✅ APPLICA RISULTATI E TORNA AL RADAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMpF8Le_srYjxgC7vb231Ng40iXwr256o",
            authDomain: "infinityn5-database.firebaseapp.com",
            databaseURL: "https://infinityn5-database-default-rtdb.firebaseio.com",
            projectId: "infinityn5-database",
            storageBucket: "infinityn5-database.firebasestorage.app",
            messagingSenderId: "506923243459",
            appId: "1:506923243459:web:4aa5e59c84c9d8156c4f76"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- INIZIO MOTORE CLOUD INVISIBILE ---
        const canaliCloud = [
            'canale_hub_turno', 'hub_sblocco_attivo', 'canale_setup_panoceania', 
            'canale_setup_nomadi', 'canale_attacco_allarme', 'canale_comunicazione_infinity',
            'canale_aro_panoceania', 'canale_aro_nomadi', 'canale_hub_calcolo', 
            'global_game_state', 'hub_update_state'
        ];

        const originalSetItem = localStorage.setItem;
        const originalRemoveItem = localStorage.removeItem;

        canaliCloud.forEach(canale => {
            onValue(ref(db, canale), (snapshot) => {
                const dati = snapshot.val();
                if (dati !== null) {
                    originalSetItem.call(localStorage, canale, dati);
                    let eventoFake = new Event('storage');
                    eventoFake.key = canale;
                    eventoFake.newValue = dati;
                    window.dispatchEvent(eventoFake);
                } else {
                    originalRemoveItem.call(localStorage, canale);
                }
            });
        });

        localStorage.setItem = function(key, value) {
            if (canaliCloud.includes(key)) {
                set(ref(db, key), value);
            } else {
                originalSetItem.call(localStorage, key, value);
            }
        };

        localStorage.removeItem = function(key) {
            if (canaliCloud.includes(key)) {
                remove(ref(db, key));
            } else {
                originalRemoveItem.call(localStorage, key);
            }
        };
        // --- FINE MOTORE CLOUD INVISIBILE ---

        window.gameState = { nomads: [], panoceania: [], activeFaction: 'NOMADI' };

        window.updateLog = (msg) => {
            const log = document.getElementById('battle-log');
            log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        };

        // Ora il bottone HTML riesce a trovare e usare questa funzione!
        window.toggleTurn = () => {
            window.gameState.activeFaction = (window.gameState.activeFaction === 'NOMADI') ? 'PANOCEANIA' : 'NOMADI';
            
            // ---> FIX DATI FANTASMA: Azzera i canali ARO al cambio turno! <---
            localStorage.removeItem('canale_comunicazione_infinity');
            localStorage.removeItem('canale_attacco_allarme');
            localStorage.removeItem('canale_aro_nomadi');
            localStorage.removeItem('canale_aro_panoceania');

            // Aggiorna l'interfaccia dell'HUB
            const textElem = document.getElementById('current-active-text');
            textElem.innerText = window.gameState.activeFaction;
            textElem.style.color = (window.gameState.activeFaction === 'NOMADI') ? '#ff0000' : '#00ccff';

            // SPEDISCE IL SEGNALE DI CAMBIO TURNO VIA CLOUD
            localStorage.setItem('canale_hub_turno', JSON.stringify({ attivo: window.gameState.activeFaction }));
            
            window.updateLog(`🔄 CAMBIO TURNO: Ora è il turno di ${window.gameState.activeFaction}`);
        };

        window.broadcastState = () => {
            localStorage.setItem('global_game_state', JSON.stringify(window.gameState));
            localStorage.setItem('canale_hub_turno', JSON.stringify({ attivo: window.gameState.activeFaction }));
        };

        setInterval(() => {
            // Ascolto Setup Nomadi
            let sNom = localStorage.getItem('canale_setup_nomadi');
            if(sNom) {
                window.gameState.nomads = JSON.parse(sNom).roster;
                localStorage.removeItem('canale_setup_nomadi');
                window.updateLog("Nomads: Roster ricevuto.");
                window.refreshUI(); window.broadcastState();
            }
            // Ascolto Setup PanO
            let sPano = localStorage.getItem('canale_setup_panoceania');
            if(sPano) {
                window.gameState.panoceania = JSON.parse(sPano).roster;
                localStorage.removeItem('canale_setup_panoceania');
                window.updateLog("PanOceania: Roster ricevuto.");
                window.refreshUI(); window.broadcastState();
            }
            // Allarme ARO
            let attacco = localStorage.getItem('canale_comunicazione_infinity');
            if(attacco) {
                window.updateLog("⚠️ ATTACCO! Allarme ARO inviato.");
                let datiAttacco = JSON.parse(attacco);
                datiAttacco.timestamp_allarme = Date.now(); 
                localStorage.setItem('canale_attacco_allarme', JSON.stringify(datiAttacco));
                localStorage.removeItem('canale_comunicazione_infinity');
            }

            // --- ASCOLTO ARO NOMADI ---
            let aroNomadi = localStorage.getItem('canale_aro_nomadi');
            if(aroNomadi) {
                window.updateLog("🛡️ ARO Nomadi completato! PanOceania può procedere.");
                localStorage.setItem('hub_sblocco_attivo', Date.now().toString()); 
                window.latestAroData = JSON.parse(aroNomadi).reazioni; 
                localStorage.removeItem('canale_aro_nomadi');
            }

            // --- ASCOLTO ARO PANOCEANIA ---
            let aroPano = localStorage.getItem('canale_aro_panoceania');
            if(aroPano) {
                window.updateLog("🛡️ ARO PanOceania completato! I Nomadi possono procedere.");
                localStorage.setItem('hub_sblocco_attivo', Date.now().toString()); 
                window.latestAroData = JSON.parse(aroPano).reazioni; 
                localStorage.removeItem('canale_aro_panoceania');
            }
            
            // ---> ASCOLTO CAMBI DI STATO <---
            let updateState = localStorage.getItem('hub_update_state');
            if(updateState) {
                let data = JSON.parse(updateState);
                let faction = data.fazione === 'NOMADI' ? window.gameState.nomads : window.gameState.panoceania;
                let unit = faction.find(u => u.id === data.unitId);
                if(unit) {
                    unit.state = data.newState;
                    window.updateLog(`🩺 STATO AGGIORNATO: ${unit.alias || unit.nome} è ora ${data.newState}`);
                    window.broadcastState(); 
                }
                localStorage.removeItem('hub_update_state');
                window.refreshUI(); 
            }
        }, 1000);

        // Generazione dei Tag di Stato usando Simboli e Icone
        window.generateStateTags = (unit) => {
            let tags = "";
            if (!unit.states) return "";
            
            if(unit.states.prone) tags += `<span class="state-tag" style="background:#333; color:#fff;" title="Prono">⬇️</span>`;
            if(unit.states.unconscious) tags += `<span class="state-tag" style="background:#8b0000; color:#fff;" title="Incosciente">💀</span>`;
            if(unit.states.wounds > 0) tags += `<span class="state-tag" style="background:#cc0000; color:#fff;" title="Ferite">🩸${unit.states.wounds}</span>`;
            if(unit.states.stunned) tags += `<span class="state-tag" style="background:#555; color:#fff;" title="Stordito">💫</span>`;
            if(unit.states.suppressive) tags += `<span class="state-tag" style="background:#ff6600; color:#000;" title="Fuoco Soppressivo">🎯</span>`;
            if(unit.states.fireteam) tags += `<span class="state-tag" style="background:#003366; color:#00ccff;" title="Fireteam">🔗 ${unit.states.fireteam}</span>`;
            
            if (unit.deployState && unit.deployState.startsWith('IMP')) tags += `<span class="state-tag" style="background:#444400; color:#ffff00;" title="Mimetismo">👤❓</span>`;
            
            return tags;
        };

        window.refreshUI = () => {
            document.getElementById('status-nomads').innerHTML = window.gameState.nomads.map(u => 
                `<div style="padding: 8px 0; border-bottom: 1px dashed #333;">
                    <b style="color:#fff; font-size:16px;">${u.alias || u.nome}</b> ${window.generateStateTags(u)}
                </div>`
            ).join('');
            
            document.getElementById('status-pano').innerHTML = window.gameState.panoceania.map(u => 
                `<div style="padding: 8px 0; border-bottom: 1px dashed #333;">
                    <b style="color:#fff; font-size:16px;">${u.alias || u.nome}</b> ${window.generateStateTags(u)}
                </div>`
            ).join('');
        };

        // ==========================================
        // 🧮 MOTORE MATEMATICO E SCHERMATA SCONTRI
        // ==========================================

        window.toggleDettagli = (id) => {
            let el = document.getElementById(id);
            if (el.style.display === 'none') el.style.display = 'block';
            else el.style.display = 'none';
        };

        // Funzione potenziata: calcola anche il numero esatto da tirare sul D20!
        window.calcolaSalvezza = (ammo, danno, armBase, btsBase) => {
            if (!ammo) ammo = "NORMALE";
            let up = ammo.toUpperCase();
            let moltiplicatore = "";
            let effetti = [];

            // Dadi Salvezza Multipli
            if (up.includes("EXP")) moltiplicatore = "<br><span style='color:#ff3333; font-weight:bold; font-size:16px;'>[x3 DADI SALVEZZA]</span>";
            else if (up.includes("DA")) moltiplicatore = "<br><span style='color:#ff9900; font-weight:bold; font-size:16px;'>[x2 DADI SALVEZZA]</span>";

            // Determina se si usa ARM o BTS
            let usaBTS = up.includes("VIRAL") || up.includes("BREAKER") || up.includes("NANOTECH") || up.includes("PLASMA");
            let statName = usaBTS ? "BTS" : "ARM";
            let statValue = usaBTS ? btsBase : armBase;

            // Modificatori dell'Armatura
            if (up.includes("AP")) {
                effetti.push("Dimezza ARM");
                if (!usaBTS) statValue = Math.ceil(statValue / 2); // Arrotonda per eccesso
            }
            if (up.includes("SHOCK")) effetti.push("Ignora NWI / 1 Ferita Extra");
            if (up.includes("VIRAL")) {
                effetti.push("Dimezza BTS");
                if (usaBTS) statValue = Math.ceil(statValue / 2);
            }
            if (up.includes("K1")) {
                effetti.push("ARM=0");
                if (!usaBTS) statValue = 0;
                danno = 12; // K1 fissa sempre il danno a 12
            }

            // Calcolo matematico: D20 >= (Danno - Statistica)
            let targetRoll = danno - statValue;
            if (targetRoll < 1) targetRoll = 1; 
            
            let effTesto = effetti.length > 0 ? `<br><span style="font-size:12px; color:#aaa;">Effetti: ${effetti.join(', ')}</span>` : "";
            
            // Il verdetto finale
            let targetText = `<br><span style="color:#00ff00; font-size:22px; font-weight:bold;">D20 al <span style="color:#fff;">${targetRoll} o più</span></span> <span style="font-size:12px; color:#888;">(Danno ${danno} - ${statName} ${statValue})</span>`;

            return `<span style="color:#00ccff; font-weight:bold;">Munizione: ${ammo}</span>${targetText}${moltiplicatore}${effTesto}`;
        };

        // 1. IL MOTORE MATEMATICO
        window.generaRisoluzioneDaDati = (dati) => {
            let scontri = [];
            let arrayAttacchi = dati.attacchi || [];
            let reazioni = window.latestAroData || [];

            let fazAttiva = window.gameState.activeFaction === 'NOMADI' ? '🔴' : '🔵';
            let fazReattiva = window.gameState.activeFaction === 'NOMADI' ? '🔵' : '🔴';

            let unitaCoinvolte = new Set();
            arrayAttacchi.forEach(att => {
                if(att.bersagli) att.bersagli.forEach(b => unitaCoinvolte.add(b.name || b.nome));
            });
            reazioni.forEach(r => unitaCoinvolte.add(r.nome));

            unitaCoinvolte.forEach(nomeDifensore => {
                let reazione = reazioni.find(r => r.nome === nomeDifensore);
                
                // --- DATI BERSAGLIO (DA SOSTITUIRE POI CON LETTURA DB) ---
                let bsDif = 11; 
                let armDif = 2; // Armatura stimata del difensore
                let btsDif = 0; // BTS stimato del difensore
                let modDif = 0;
                let tgNumberDif = 0;
                let burstDif = 0;
                let dettReazione = "Il bersaglio non ha dichiarato reazioni o ha passato.";
                let azioneReazione = "Nessuna Reazione";
                let ammoDif = reazione ? (reazione.ammo || "NORMALE") : "-";
                let damDif = 13; // Danno stimato arma reazione (es. Combi)

                if (reazione && reazione.azione !== "Nessun ARO" && reazione.azione !== "Passa") {
                    azioneReazione = reazione.azione;
                    burstDif = 1;
                    if (reazione.azione === "DODGE" || reazione.azione === "RESET") {
                        tgNumberDif = bsDif;
                        dettReazione = `Statistica Base (Stimata): ${bsDif}<br><span style="color:#aaa">Schivata/Reset non subiscono malus di copertura.</span>`;
                        damDif = 0; // Schivare non fa danno
                    } else {
                        modDif = (reazione.rangeMod || 0) + (reazione.cover ? -3 : 0);
                        tgNumberDif = bsDif + modDif;
                        dettReazione = `Statistica Base (Stimata): ${bsDif}<br>`;
                        dettReazione += `<span style="color:#00ff00">Gittata: ${reazione.rangeMod > 0 ? '+'+reazione.rangeMod : reazione.rangeMod || 0}</span><br>`;
                        if(reazione.cover) dettReazione += `<span style="color:#ff3333">Copertura nemica: -3</span>`;
                    }
                }

                let attaccantiCheMiranoQui = arrayAttacchi.filter(att => att.bersagli && att.bersagli.some(b => (b.name || b.nome) === nomeDifensore));

                // CASO A: Almeno un attaccante gli sta sparando
                if (attaccantiCheMiranoQui.length > 0) {
                    
                    let isF2F = (burstDif > 0);
                    if (reazione && reazione.azione !== 'DODGE' && reazione.azione !== 'RESET' && reazione.bersaglio) {
                         if(!attaccantiCheMiranoQui.some(a => a.attaccante === reazione.bersaglio)) isF2F = false;
                    }

                    attaccantiCheMiranoQui.forEach(att => {
                        let bersaglioSpecifico = att.bersagli.find(b => (b.name || b.nome) === nomeDifensore);
                        
                        // --- DATI ATTACCANTE (DA SOSTITUIRE POI CON LETTURA DB) ---
                        let bsAtt = 12; 
                        let armAtt = 3; // Armatura stimata dell'attaccante
                        let btsAtt = 0; // BTS stimato dell'attaccante
                        let damAtt = 14; // Danno stimato arma attaccante (es. MULTI)

                        let modAtt = (bersaglioSpecifico.rangeMod || 0) + (bersaglioSpecifico.cover ? -3 : 0);
                        let tgNumberAtt = bsAtt + modAtt;
                        let burstAtt = bersaglioSpecifico.burst || 0;
                        let ammoAtt = bersaglioSpecifico.ammo || "NORMALE";
                        
                        let dettAtt = `Statistica Base (Stimata): ${bsAtt}<br>`;
                        dettAtt += `<span style="color:#00ff00">Gittata: ${bersaglioSpecifico.rangeMod > 0 ? '+'+bersaglioSpecifico.rangeMod : bersaglioSpecifico.rangeMod}</span><br>`;
                        if(bersaglioSpecifico.cover) dettAtt += `<span style="color:#ff3333">Copertura nemica: -3</span>`;

                        scontri.push({
                            titolo: isF2F ? "TIRO FACCIA A FACCIA" : "TIRO NORMALE",
                            attivo: {
                                nome: att.attaccante, fazione: fazAttiva, azione: att.azione, 
                                mod: tgNumberAtt, burst: burstAtt,
                                dettagliMod: dettAtt,
                                salvezza: (burstDif > 0 && damDif > 0) ? window.calcolaSalvezza(ammoDif, damDif, armAtt, btsAtt) : "<span style='color:#555;'>Nessun danno in arrivo</span>"
                            },
                            reattivo: {
                                nome: nomeDifensore, fazione: fazReattiva, azione: azioneReazione, 
                                mod: tgNumberDif, burst: burstDif,
                                dettagliMod: dettReazione,
                                salvezza: (burstAtt > 0 && damAtt > 0) ? window.calcolaSalvezza(ammoAtt, damAtt, armDif, btsDif) : "<span style='color:#555;'>Nessun danno in arrivo</span>"
                            }
                        });
                    });
                } 
                // CASO B: Tiro Libero Reattivo
                else if (burstDif > 0) {
                    // Se c'è solo l'attaccante stimiamo le sue stat per la salvezza
                    let armAtt = 3; let btsAtt = 0;

                    scontri.push({
                        titolo: "TIRO NORMALE",
                        attivo: {
                            nome: dati.isCoordinated ? "Squadra Coordinata" : (arrayAttacchi[0] ? arrayAttacchi[0].attaccante : "Attaccante"), 
                            fazione: fazAttiva, azione: "Ha ignorato il bersaglio", 
                            mod: "-", burst: 0,
                            dettagliMod: "Nessun tiro contro questa miniatura.",
                            salvezza: damDif > 0 ? window.calcolaSalvezza(ammoDif, damDif, armAtt, btsAtt) : "<span style='color:#555;'>Nessun danno in arrivo</span>"
                        },
                        reattivo: {
                            nome: nomeDifensore, fazione: fazReattiva, azione: azioneReazione, 
                            mod: tgNumberDif, burst: burstDif,
                            dettagliMod: dettReazione,
                            salvezza: "<span style='color:#555;'>Nessun danno in arrivo</span>"
                        }
                    });
                }
            });

            return scontri;
        };

        // 2. DISEGNA L'INTERFACCIA
        window.mostraSchermataRisoluzione = (scontri) => {
            document.querySelector('.turn-controller').style.display = 'none';
            document.querySelector('.status-grid').style.display = 'none';
            document.querySelector('.log-container').style.display = 'none';
            
            document.getElementById('step-resolution').style.display = 'block';

            let container = document.getElementById('clash-container');
            container.innerHTML = "";

            if (!scontri || scontri.length === 0) {
                container.innerHTML = `<h2 style="color:red; text-align:center;">NESSUN TIRO DI DADO DA EFFETTUARE.</h2>`;
                return;
            }

            scontri.forEach((scontro, index) => {
                let dadiDifensoreHtml = scontro.reattivo.burst > 0 
                    ? `<div style="margin-top:15px; font-size:18px; color:#fff;">Dadi da lanciare: <span style="color:#ff3333; font-weight:bold; font-size:28px;">${scontro.reattivo.burst}</span></div>`
                    : `<div style="margin-top:15px; font-size:18px; color:#555;">Nessun dado</div>`;

                let dadiAttaccanteHtml = scontro.attivo.burst > 0 
                    ? `<div style="margin-top:15px; font-size:18px; color:#fff;">Dadi da lanciare: <span style="color:#00ccff; font-weight:bold; font-size:28px;">${scontro.attivo.burst}</span></div>`
                    : `<div style="margin-top:15px; font-size:18px; color:#555;">Nessun dado</div>`;

                container.innerHTML += `
                    <div style="background:#111; border:2px solid #444; border-radius:10px; padding:15px; margin-bottom:20px; box-shadow: 0 0 15px rgba(255,255,255,0.05);">
                        <h3 style="color:#00ff00; text-align:center; margin-top:0; font-family:'Teko'; font-size:32px; letter-spacing:1px;">${scontro.titolo}</h3>
                        
                        <div style="display:flex; justify-content:space-between; background:#000; border-radius:8px; overflow:hidden;">
                            
                            <div style="flex:1; border-right:2px solid #333; padding:15px; background:linear-gradient(90deg, #001a33, #000);">
                                <b style="color:#00ccff; font-size:22px;">${scontro.attivo.fazione} ${scontro.attivo.nome}</b><br>
                                <span style="color:#aaa; font-size:14px;">Azione:</span> <span style="color:#fff;">${scontro.attivo.azione}</span><br>
                                <span style="color:#aaa; font-size:14px;">Successo al:</span> <span style="color:#00ff00; font-weight:bold; font-size:24px;">${scontro.attivo.mod}</span> <span style="color:#888; font-size:12px;">(o meno)</span><br>
                                ${dadiAttaccanteHtml}
                            </div>
                            
                            <div style="flex:1; padding:15px; text-align:right; background:linear-gradient(-90deg, #330000, #000);">
                                <b style="color:#ff3333; font-size:22px;">${scontro.reattivo.fazione} ${scontro.reattivo.nome}</b><br>
                                <span style="color:#aaa; font-size:14px;">Azione:</span> <span style="color:#fff;">${scontro.reattivo.azione}</span><br>
                                <span style="color:#aaa; font-size:14px;">Successo al:</span> <span style="color:#00ff00; font-weight:bold; font-size:24px;">${scontro.reattivo.mod}</span> <span style="color:#888; font-size:12px;">(o meno)</span><br>
                                ${dadiDifensoreHtml}
                            </div>
                        </div>

                        <div style="display:flex; justify-content:space-between; margin-top:10px; background:#0a0a0a; border-radius:5px; padding:10px; font-size:14px; border: 1px solid #333;">
                            <div style="flex:1; border-right:1px dashed #333; padding-right:10px;">
                                <b style="color:#aaa;">🛡️ SE COLPITO DAL NEMICO:</b><br>
                                ${scontro.attivo.salvezza}
                            </div>
                            <div style="flex:1; padding-left:10px; text-align:right;">
                                <b style="color:#aaa;">🛡️ SE COLPITO DALL'ATTACCANTE:</b><br>
                                ${scontro.reattivo.salvezza}
                            </div>
                        </div>

                        <div style="text-align:center; margin-top:15px;">
                            <button onclick="window.toggleDettagli('dettagli-${index}')" style="background:#222; border:1px dashed #555; color:#aaa; font-family:'Share Tech Mono'; padding:5px 15px; cursor:pointer; font-size:12px; border-radius:5px;">🔍 MOSTRA DETTAGLI CALCOLI</button>
                        </div>

                        <div id="dettagli-${index}" style="display:none; margin-top:10px; padding:10px; background:#0a0a0a; border:1px solid #333; border-radius:5px; font-size:14px;">
                            <div style="display:flex; justify-content:space-between;">
                                <div style="flex:1; border-right:1px solid #333; padding-right:10px; color:#ddd;">
                                    ${scontro.attivo.dettagliMod || "-"}
                                </div>
                                <div style="flex:1; padding-left:10px; text-align:right; color:#ddd;">
                                    ${scontro.reattivo.dettagliMod || "-"}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        window.chiudiRisoluzione = () => {
            document.getElementById('step-resolution').style.display = 'none';
            document.querySelector('.turn-controller').style.display = 'block';
            document.querySelector('.status-grid').style.display = 'grid'; 
            document.querySelector('.log-container').style.display = 'block';
        };

        // Ascolto finale
        setInterval(() => {
            let calcolo = localStorage.getItem('canale_hub_calcolo');
            if(calcolo) {
                window.updateLog("🎲 Ricevuti i parametri finali! Calcolo in corso...");
                
                let datiReali = JSON.parse(calcolo);
                let scontriCalcolati = window.generaRisoluzioneDaDati(datiReali);
                
                window.mostraSchermataRisoluzione(scontriCalcolati);
                
                localStorage.removeItem('canale_hub_calcolo');
            }
        }, 1000);

    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrato con successo: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('Errore ServiceWorker: ', err);
                    });
            });
        }
    </script>
    
</body>

</html>
